<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Portais</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #5349B1 0%, #7c6fd8 100%);
            min-height: 100vh;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        body.login-page {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body.login-page .page.active {
            width: 100%;
            display: flex !important;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .login-card h1 {
            color: #2d3748;
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            justify-content: center;
        }

        .login-card p {
            color: #718096;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 500;
            color: #4a5568;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }

        input,
        select {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-family: 'Roboto', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.3s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #5349B1;
        }

        button,
        .btn {
            width: auto;
            padding: 0.7rem 1.5rem;
            background: #5349B1;
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Roboto', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        button:hover,
        .btn:hover {
            background: #4338a0;
            transform: translateY(-2px);
        }

        .erro {
            background: #fed7d7;
            color: #9b2c2c;
            padding: 0.7rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .msg {
            padding: 0.7rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .msg.erro {
            background: #fed7d7;
            color: #9b2c2c;
        }

        .msg.sucesso {
            background: #c6f6d5;
            color: #22543d;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
        }

        .top-bar>span {
            color: white;
            font-weight: 600;
        }

        .top-bar a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.4rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            transition: background 0.3s;
        }

        .top-bar a:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .top-bar .logo-link {
            border: none;
            border-radius: 0;
            padding: 0;
        }
        .top-bar .logo-link:hover {
            background: none;
        }

        header {
            padding: 2rem;
            text-align: center;
            color: white;
        }

        h1 {
            font-weight: 700;
            font-size: 2rem;
        }

        .back-link {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-block;
            margin-top: 0.5rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
        }

        .flex-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .state-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #2d3748;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            gap: 1rem;
            position: relative;
        }

        .state-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.2);
        }

        .state-flag {
            width: 120px;
            height: 80px;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .state-name {
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
        }

        .header-state {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .header-flag {
            width: 60px;
            height: 40px;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .client-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #2d3748;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            gap: 1rem;
            min-height: 180px;
            justify-content: center;
            position: relative;
        }

        .client-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .client-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 12px;
        }

        .client-logo-placeholder {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #718096;
        }

        .client-name {
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
        }

        .category-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .category-header {
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-weight: 700;
            font-size: 1.1rem;
            color: white;
        }

        .category-header .cat-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .category-header .cat-count {
            margin-left: auto;
            background: rgba(255, 255, 255, 0.25);
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .cat-prd .category-header {
            background: linear-gradient(135deg, #38a169, #48bb78);
        }

        .cat-tre .category-header {
            background: linear-gradient(135deg, #dd6b20, #ed8936);
        }

        .cat-ext .category-header {
            background: linear-gradient(135deg, #d69e2e, #ecc94b);
        }

        .cat-bi .category-header {
            background: linear-gradient(135deg, #805ad5, #9f7aea);
        }

        .cat-int .category-header {
            background: linear-gradient(135deg, #3182ce, #4299e1);
        }

        .category-body {
            padding: 0.8rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 0.8rem;
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.2rem;
            background: #f8fafc;
            border-radius: 12px;
            text-decoration: none;
            color: #2d3748;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            border: 1px solid #e2e8f0;
        }

        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            background: white;
        }

        .link-info {
            flex: 1;
            min-width: 0;
        }

        .link-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: #2d3748;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .link-url-text {
            font-size: 0.75rem;
            color: #a0aec0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 0.15rem;
        }

        .link-arrow {
            color: #cbd5e1;
            font-size: 1.2rem;
            flex-shrink: 0;
            transition: color 0.2s;
        }

        .link-card:hover .link-arrow {
            color: #5349B1;
        }

        .no-data {
            color: #a0aec0;
            font-style: italic;
            font-size: 0.9rem;
            padding: 0.5rem 0;
        }

        @media (max-width: 600px) {
            .category-body {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- LOGIN -->
    <div id="page-login" class="page active">
        <div class="login-card">
            <img src="static/noxtec-logo.png" alt="NoxTec" style="width:120px;margin-bottom:1.5rem;">
            <h1>Painel de Portais</h1>
            <div id="login-erro" class="erro" style="display:none;"></div>
            <form onsubmit="return doLogin(event)">
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" style="width:100%;">Entrar</button>
            </form>
        </div>
    </div>

    <!-- ESTADOS -->
    <div id="page-estados" class="page">
        <div class="top-bar">
            <a href="#" onclick="navigate('estados');return false;" class="logo-link"><img src="static/noxtec-logo-branca.png" alt="NoxTec" style="height:36px;"></a>
            <div id="topbar-estados"></div>
        </div>
        <header>
            <h1>Selecione o Estado</h1>
        </header>
        <div class="container grid-container" id="estados-grid"></div>
    </div>

    <!-- CLIENTES -->
    <div id="page-clientes" class="page">
        <div class="top-bar">
            <a href="#" onclick="navigate('estados');return false;" class="logo-link"><img src="static/noxtec-logo-branca.png" alt="NoxTec" style="height:36px;"></a>
            <div id="topbar-clientes"></div>
        </div>
        <header>
            <div class="header-state">
                <img id="clientes-flag" class="header-flag" style="display:none;">
                <h1 id="clientes-estado-nome"></h1>
            </div>
            <a href="#" class="back-link" onclick="navigate('estados');return false;">&larr; Voltar para estados</a>
        </header>
        <div class="container grid-container" id="clientes-grid"></div>
    </div>

    <!-- LINKS -->
    <div id="page-links" class="page">
        <div class="top-bar">
            <a href="#" onclick="navigate('estados');return false;" class="logo-link"><img src="static/noxtec-logo-branca.png" alt="NoxTec" style="height:36px;"></a>
            <div id="topbar-links"></div>
        </div>
        <header>
            <h1 id="links-cliente-nome"></h1>
            <a href="#" class="back-link" id="links-back">&larr; Voltar para clientes</a>
        </header>
        <div class="container flex-container" id="links-container"></div>
    </div>

    <script>
        var defaultAPP_DATA = { "Pernambuco": { "flag": "static/bandeira-pe.webp", "clients": { "AFPES": { "logo": "static/afpes-logo.png", "links": [{ "name": "Noxcare PRD", "url": "https://afpes-prd.nox.app.br/#/", "badge": "PRD" }, { "name": "IS - Portal PRD", "url": "https://afpes-prd.nox.app.br/portal-ui/#/login", "badge": "PRD" }, { "name": "Notification PRD", "url": "https://afpes-prd.nox.app.br/auth-api/login", "badge": "PRD" }, { "name": "Noxcare TRE", "url": "https://afpes-tre.nox.app.br/#/", "badge": "TRE" }, { "name": "IS - Portal TRE", "url": "https://afpes-tre.nox.app.br/portal-ui/#/login", "badge": "TRE" }, { "name": "Notification TRE", "url": "https://afpes-tre.nox.app.br/auth-api/login", "badge": "TRE" }] }, "Rede Virtude": { "logo": "static/rvt-logo.png", "links": [{ "name": "Noxcare PRD", "url": "https://rvt-prd.nox.app.br/#/", "badge": "PRD" }, { "name": "IS4 PRD", "url": "https://is4.redeis.com.br/rvt-prd/", "badge": "PRD" }, { "name": "Noxcare - Portal PRD", "url": "https://rvt-prd.nox.app.br/portal-ui/#/login", "badge": "PRD" }, { "name": "Notification PRD", "url": "https://rvt-prd.nox.app.br/auth-api/login", "badge": "PRD" }, { "name": "Noxcare TRE", "url": "https://rvt-tre.nox.app.br/#/", "badge": "TRE" }, { "name": "IS4 TRE", "url": "https://is4.redeis.com.br/rvt-tre/", "badge": "TRE" }, { "name": "Noxcare - Portal TRE", "url": "https://rvt-tre.nox.app.br/portal-ui/#/login", "badge": "TRE" }, { "name": "Notification TRE", "url": "https://rvt-tre.nox.app.br/auth-api/login", "badge": "TRE" }] }, "Cisne": { "logo": "static/cisne-logo.png", "links": [{ "name": "Noxcare PRD", "url": "https://cisne-prd.nox.app.br/#/", "badge": "PRD" }, { "name": "IS - Portal PRD", "url": "https://cisne-prd.nox.app.br/portal-ui/#/login", "badge": "PRD" }, { "name": "Notification PRD", "url": "https://cisne-prd.nox.app.br/auth-api/login", "badge": "PRD" }, { "name": "IS4 PRD", "url": "http://is4.redeis.com.br:8888/cisne-prd/logon.jsp?sys=SIH&action=logout&back=true", "badge": "PRD" }, { "name": "Noxcare TRE", "url": "https://cisne-tre.nox.app.br/#/", "badge": "TRE" }, { "name": "IS - Portal TRE", "url": "https://cisne-tre.nox.app.br/portal-ui/#/login", "badge": "TRE" }, { "name": "Notification TRE", "url": "https://cisne-tre.nox.app.br/auth-api/login", "badge": "TRE" }] }, "Santa Maria": { "logo": "static/hsm-logo.png", "links": [{ "name": "Noxcare PRD", "url": "https://hsm-prd.nox.app.br/#/", "badge": "PRD" }, { "name": "IS - Portal PRD", "url": "https://hsm-prd.nox.app.br/portal-ui/#/login", "badge": "PRD" }, { "name": "IS4 PRD", "url": "https://is4.redeis.com.br/hsm-prd/", "badge": "PRD" }, { "name": "Notification PRD", "url": "https://hsm-prd.nox.app.br/auth-api/login", "badge": "PRD" }, { "name": "Noxcare TRE", "url": "https://hsm-tre.nox.app.br/#/", "badge": "TRE" }, { "name": "IS - Portal TRE", "url": "https://hsm-tre.nox.app.br/portal-ui/#/login", "badge": "TRE" }, { "name": "IS4 TRE", "url": "https://is4.redeis.com.br/hsm-tre/", "badge": "TRE" }, { "name": "Notification TRE", "url": "https://hsm-tre.nox.app.br/auth-api/login", "badge": "TRE" }, { "name": "Sharepoint / Docs", "url": "https://noxtecservicos.sharepoint.com/sites/DiretoriadeTecnologia/Documentos%20Compartilhados/Forms/AllItems.aspx", "badge": "INT" }] } } }, "Rio de Janeiro": { "flag": "static/bandeira-rj.png", "clients": { "Nova Friburgo": { "logo": "static/nfb-logo.png", "links": [{ "name": "Noxcare NFB PRD", "url": "https://nfb-prd.nox.app.br/#/", "badge": "PRD" }, { "name": "Regulação NFB PRD", "url": "https://nfb-prd.nox.app.br/regulation-ui/login/select-user-health-unit", "badge": "PRD" }, { "name": "IS4 PRD", "url": "http://is4.redeis.com.br:8888/nfb/", "badge": "PRD" }, { "name": "Noxcare TRE", "url": "https://nfb-tre.nox.app.br/#/", "badge": "TRE" }, { "name": "Regulação TRE", "url": "https://nfb-tre.nox.app.br/regulation-ui/regulation/waiting-list", "badge": "TRE" }, { "name": "IS4 TRE", "url": "http://is4.redeis.com.br:8888/nfb-tre/", "badge": "TRE" }, { "name": "PEC", "url": "https://esusab.pmnf.rj.gov.br:8080/", "badge": "EXT" }, { "name": "BI Regulação", "url": "https://app.powerbi.com/view?r=eyJrIjoiNGQ2OTg0ZjYtNDg5OC00OTk3LThhMDMtMDMyNzA0YTM0OGVhIiwidCI6ImYyYmM4YzM3LWFmYjgtNDE1Ny1hNGFmLWRlYTAxNjQ3OGU1ZSJ9", "badge": "BI" }, { "name": "IS-Indicadores", "url": "https://nfb.redeis.com.br/nfb-ui-is/IS-indicadores/#/", "badge": "BI" }, { "name": "NOXTEC - Login", "url": "https://noxcare.saladegestao.com.br/gestao/login", "badge": "INT" }] } } } };

        var storedAppData = localStorage.getItem('painelAppData');
        var APP_DATA = storedAppData ? JSON.parse(storedAppData) : defaultAPP_DATA;

        function saveData() {
            localStorage.setItem('painelAppData', JSON.stringify(APP_DATA));
        }

        var USERS = { "comum": { "password": "timetech" } };

        var session = { loggedIn: false, username: '' };
        var currentPage = '';
        var navEstado = '';
        var navCliente = '';

        function navigate(page, arg1, arg2) {
            if (page === 'clientes') { navEstado = arg1; }
            if (page === 'links') { navEstado = arg1; navCliente = arg2; }
            window.location.hash = page + (arg1 ? '/' + encodeURIComponent(arg1) : '') + (arg2 ? '/' + encodeURIComponent(arg2) : '');
        }

        function renderTopbar(containerId) {
            var html = '<div>';
            if (currentPage !== 'estados' && currentPage !== 'login') {
                html += '<a href="#" onclick="navigate(\'estados\');return false;">Estados</a> ';
            }
            html += '<a href="#" onclick="doLogout();return false;">Sair</a></div>';
            document.getElementById(containerId).innerHTML = html;
        }

        function renderEstados() {
            renderTopbar('topbar-estados');
            var grid = document.getElementById('estados-grid');
            var html = '';
            for (var nome in APP_DATA) {
                var info = APP_DATA[nome];
                html += '<div class="state-card">';
                html += '<a href="#" onclick="navigate(\'clientes\',\'' + esc(nome) + '\');return false;" style="text-decoration:none;color:inherit;display:flex;flex-direction:column;align-items:center;gap:1rem;width:100%;">';
                if (info.flag) {
                    html += '<img class="state-flag" src="' + esc(info.flag) + '" alt="' + esc(nome) + '">';
                }
                html += '<span class="state-name">' + esc(nome) + '</span></a></div>';
            }
            grid.innerHTML = html;
        }

        function renderClientes() {
            renderTopbar('topbar-clientes');
            var estado = navEstado;
            var info = APP_DATA[estado];
            if (!info) { navigate('estados'); return; }
            document.getElementById('clientes-estado-nome').textContent = estado;
            var flagEl = document.getElementById('clientes-flag');
            if (info.flag) {
                flagEl.src = info.flag;
                flagEl.style.display = '';
            } else {
                flagEl.style.display = 'none';
            }
            var grid = document.getElementById('clientes-grid');
            var html = '';
            var clients = info.clients || {};
            for (var nome in clients) {
                var cli = clients[nome];
                html += '<div class="client-card">';
                html += '<a href="#" onclick="navigate(\'links\',\'' + esc(estado) + '\',\'' + esc(nome) + '\');return false;" style="text-decoration:none;color:inherit;display:flex;flex-direction:column;align-items:center;gap:1rem;width:100%;">';
                if (cli.logo) {
                    html += '<img class="client-logo" src="' + esc(cli.logo) + '" alt="' + esc(nome) + '">';
                } else {
                    html += '<div class="client-logo-placeholder">' + esc(nome.charAt(0)) + '</div>';
                }
                html += '<span class="client-name">' + esc(nome) + '</span></a></div>';
            }
            grid.innerHTML = html;
        }

        function renderLinks() {
            renderTopbar('topbar-links');
            var estado = navEstado;
            var cliente = navCliente;
            var info = APP_DATA[estado];
            if (!info || !info.clients || !info.clients[cliente]) { navigate('estados'); return; }
            document.getElementById('links-cliente-nome').textContent = cliente;
            document.getElementById('links-back').setAttribute('onclick', "navigate('clientes','" + esc(estado) + "');return false;");
            var links = info.clients[cliente].links || [];
            var badgeOrder = ['PRD', 'TRE', 'EXT', 'BI', 'INT'];
            var badgeLabels = { 'PRD': 'Produção', 'TRE': 'Treinamento', 'EXT': 'Externo', 'BI': 'Business Intelligence', 'INT': 'Interno' };
            var badgeIcons = { 'PRD': 'static/prd.png', 'TRE': 'static/tre.png', 'EXT': 'static/ext.png', 'BI': 'static/bi.png', 'INT': 'static/int.png' };
            var container = document.getElementById('links-container');
            var html = '';
            for (var b = 0; b < badgeOrder.length; b++) {
                var badge = badgeOrder[b];
                var filtered = links.filter(function (l) { return l.badge === badge; });
                if (filtered.length === 0) continue;
                html += '<div class="category-section cat-' + badge.toLowerCase() + '">';
                html += '<div class="category-header"><div class="cat-icon">' + badge + '</div><span>' + badgeLabels[badge] + '</span><span class="cat-count">' + filtered.length + '</span></div>';
                html += '<div class="category-body">';
                for (var i = 0; i < links.length; i++) {
                    var link = links[i];
                    if (link.badge !== badge) continue;
                    html += '<a href="' + esc(link.url) + '" target="_blank" class="link-card">';
                    html += '<div class="link-info"><div class="link-name">' + esc(link.name) + '</div><div class="link-url-text">' + esc(link.url) + '</div></div>';
                    html += '<span class="link-arrow">&#8250;</span></a>';
                }
                html += '</div></div>';
            }
            container.innerHTML = html;
        }

        function esc(s) {
            if (!s) return '';
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function showPage(page) {
            var pages = document.querySelectorAll('.page');
            for (var i = 0; i < pages.length; i++) pages[i].classList.remove('active');
            document.getElementById('page-' + page).classList.add('active');
            currentPage = page;
            document.body.className = (page === 'login') ? 'login-page' : '';
        }

        function doLogin(e) {
            e.preventDefault();
            var u = document.getElementById('username').value.trim();
            var p = document.getElementById('password').value.trim();
            var user = USERS[u];
            if (!user) {
                var el = document.getElementById('login-erro');
                el.textContent = 'Usuário ou senha inválidos';
                el.style.display = '';
                return false;
            }
            var pw = typeof user === 'string' ? user : user.password;
            if (pw !== p) {
                var el2 = document.getElementById('login-erro');
                el2.textContent = 'Usuário ou senha inválidos';
                el2.style.display = '';
                return false;
            }
            session.loggedIn = true;
            session.username = u;
            navigate('estados');
            return false;
        }

        function doLogout() {
            session = { loggedIn: false, username: '' };
            navigate('login');
        }

        function renderCurrentPage() {
            if (currentPage === 'estados') renderEstados();
            else if (currentPage === 'clientes') renderClientes();
            else if (currentPage === 'links') renderLinks();
        }

        function handleHash() {
            var hash = window.location.hash.replace('#', '');
            if (!hash || hash === 'login') {
                if (!session.loggedIn) { showPage('login'); return; }
                navigate('estados');
                return;
            }
            if (!session.loggedIn) { showPage('login'); return; }
            var parts = hash.split('/');
            var page = parts[0];
            var arg1 = parts[1] ? decodeURIComponent(parts[1]) : '';
            var arg2 = parts[2] ? decodeURIComponent(parts[2]) : '';
            if (page === 'estados') { showPage('estados'); renderEstados(); }
            else if (page === 'clientes') { navEstado = arg1; showPage('clientes'); renderClientes(); }
            else if (page === 'links') { navEstado = arg1; navCliente = arg2; showPage('links'); renderLinks(); }
            else { showPage('login'); }
        }

        window.addEventListener('hashchange', handleHash);
        handleHash();
    </script>
</body>

</html>
