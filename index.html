<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Portais</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #5349B1 0%, #7c6fd8 100%);
            min-height: 100vh;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        body.login-page {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body.login-page .page.active {
            width: 100%;
            display: flex !important;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .login-card h1 {
            color: #2d3748;
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            justify-content: center;
        }

        .login-card p {
            color: #718096;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 500;
            color: #4a5568;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }

        input,
        select {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-family: 'Roboto', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.3s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #5349B1;
        }

        button,
        .btn {
            width: auto;
            padding: 0.7rem 1.5rem;
            background: #5349B1;
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Roboto', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        button:hover,
        .btn:hover {
            background: #4338a0;
            transform: translateY(-2px);
        }

        .erro {
            background: #fed7d7;
            color: #9b2c2c;
            padding: 0.7rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .msg {
            padding: 0.7rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .msg.erro {
            background: #fed7d7;
            color: #9b2c2c;
        }

        .msg.sucesso {
            background: #c6f6d5;
            color: #22543d;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
        }

        .top-bar .logout-btn {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 500;
            padding: 0.4rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
        }

        .top-bar>span {
            color: white;
            font-weight: 600;
        }

        .top-bar a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.4rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            transition: background 0.3s;
        }

        .top-bar a:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .top-bar .logo-link {
            border: none;
            border-radius: 0;
            padding: 0;
        }

        .top-bar .logo-link:hover {
            background: none;
        }

        header {
            padding: 2rem;
            text-align: center;
            color: white;
        }

        h1 {
            font-weight: 700;
            font-size: 2rem;
        }

        .back-link {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-block;
            margin-top: 0.5rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
        }

        .flex-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .state-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #2d3748;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            gap: 1rem;
            position: relative;
        }

        .state-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.2);
        }

        .state-flag {
            width: 120px;
            height: 80px;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .state-name {
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
        }

        .header-state {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .header-flag {
            width: 60px;
            height: 40px;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .client-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #2d3748;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            gap: 1rem;
            min-height: 180px;
            justify-content: center;
            position: relative;
        }

        .client-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .client-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 12px;
        }

        .client-logo-placeholder {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #718096;
        }

        .client-name {
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
        }

        .category-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .category-header {
            padding: 0.7rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
        }

        .category-header .cat-icon {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .category-header .cat-count {
            margin-left: auto;
            background: rgba(255, 255, 255, 0.25);
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .cat-prd .category-header {
            background: linear-gradient(135deg, #38a169, #48bb78);
        }

        .cat-tre .category-header {
            background: linear-gradient(135deg, #dd6b20, #ed8936);
        }

        .cat-ext .category-header {
            background: linear-gradient(135deg, #d69e2e, #ecc94b);
        }

        .cat-bi .category-header {
            background: linear-gradient(135deg, #805ad5, #9f7aea);
        }

        .cat-int .category-header {
            background: linear-gradient(135deg, #3182ce, #4299e1);
        }

        .category-body {
            padding: 0.8rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.8rem;
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 0.8rem;
            background: #f8fafc;
            border-radius: 8px;
            text-decoration: none;
            color: #2d3748;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            border: 1px solid #e2e8f0;
        }

        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            background: white;
        }

        .link-info {
            flex: 1;
            min-width: 0;
        }

        .link-name {
            font-weight: 500;
            font-size: 1.0rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #2d3748;
            line-height: 1.2;
        }

        .link-arrow {
            color: #cbd5e1;
            font-size: 1.2rem;
            flex-shrink: 0;
            transition: color 0.2s;
        }

        .link-card:hover .link-arrow {
            color: #5349B1;
        }

        .no-data {
            color: #a0aec0;
            font-style: italic;
            font-size: 0.9rem;
            padding: 0.5rem 0;
        }

        @media (max-width: 600px) {
            .category-body {
                grid-template-columns: 1fr;
            }

            .dashboard-clients-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 900px) {
            .dashboard-clients-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .dashboard-state {
            margin-bottom: 3rem;
        }

        .dashboard-state-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 1.5rem;
            color: white;
        }

        .dashboard-state-flag {
            width: 60px;
            height: 40px;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .dashboard-state-title {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .dashboard-client {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 1.2rem;
            margin-bottom: 0;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .dashboard-client-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .dashboard-client-logo {
            width: 50px;
            height: 50px;
            object-fit: contain;
            border-radius: 8px;
            background: white;
            padding: 0.2rem;
        }

        .dashboard-client-placeholder {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.0rem;
            color: #718096;
            font-weight: bold;
        }

        .dashboard-client-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
        }

        .dashboard-clients-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
        }

        .dashboard-clients-grid .dashboard-client {
            width: 250px;
        }
    </style>
</head>

<body>

        </div>
        <header>

    </div>

    <script>
        var defaultAPP_DATA = { "Pernambuco": { "flag": "static/bandeira-pe.webp", "clients": { "AFPES": { "logo": "static/afpes-logo.png", "links": [{ "name": "Noxcare PRD", "url": "https://afpes-prd.nox.app.br/#/", "badge": "PRD" }, { "name": "IS - Portal PRD", "url": "https://afpes-prd.nox.app.br/portal-ui/#/login", "badge": "PRD" }, { "name": "Notification PRD", "url": "https://afpes-prd.nox.app.br/auth-api/login", "badge": "PRD" }, { "name": "Noxcare TRE", "url": "https://afpes-tre.nox.app.br/#/", "badge": "TRE" }, { "name": "IS - Portal TRE", "url": "https://afpes-tre.nox.app.br/portal-ui/#/login", "badge": "TRE" }, { "name": "Notification TRE", "url": "https://afpes-tre.nox.app.br/auth-api/login", "badge": "TRE" }] }, "Rede Virtude": { "logo": "static/rvt-logo.png", "links": [{ "name": "Noxcare PRD", "url": "https://rvt-prd.nox.app.br/#/", "badge": "PRD" }, { "name": "IS4 PRD", "url": "https://is4.redeis.com.br/rvt-prd/", "badge": "PRD" }, { "name": "Noxcare - Portal PRD", "url": "https://rvt-prd.nox.app.br/portal-ui/#/login", "badge": "PRD" }, { "name": "Notification PRD", "url": "https://rvt-prd.nox.app.br/auth-api/login", "badge": "PRD" }, { "name": "Noxcare TRE", "url": "https://rvt-tre.nox.app.br/#/", "badge": "TRE" }, { "name": "IS4 TRE", "url": "https://is4.redeis.com.br/rvt-tre/", "badge": "TRE" }, { "name": "Noxcare - Portal TRE", "url": "https://rvt-tre.nox.app.br/portal-ui/#/login", "badge": "TRE" }, { "name": "Notification TRE", "url": "https://rvt-tre.nox.app.br/auth-api/login", "badge": "TRE" }] }, "Cisne": { "logo": "static/cisne-logo.png", "links": [{ "name": "Noxcare PRD", "url": "https://cisne-prd.nox.app.br/#/", "badge": "PRD" }, { "name": "IS - Portal PRD", "url": "https://cisne-prd.nox.app.br/portal-ui/#/login", "badge": "PRD" }, { "name": "Notification PRD", "url": "https://cisne-prd.nox.app.br/auth-api/login", "badge": "PRD" }, { "name": "IS4 PRD", "url": "http://is4.redeis.com.br:8888/cisne-prd/logon.jsp?sys=SIH&action=logout&back=true", "badge": "PRD" }, { "name": "Noxcare TRE", "url": "https://cisne-tre.nox.app.br/#/", "badge": "TRE" }, { "name": "IS - Portal TRE", "url": "https://cisne-tre.nox.app.br/portal-ui/#/login", "badge": "TRE" }, { "name": "Notification TRE", "url": "https://cisne-tre.nox.app.br/auth-api/login", "badge": "TRE" }] }, "Santa Maria": { "logo": "static/hsm-logo.png", "links": [{ "name": "Noxcare PRD", "url": "https://hsm-prd.nox.app.br/#/", "badge": "PRD" }, { "name": "IS - Portal PRD", "url": "https://hsm-prd.nox.app.br/portal-ui/#/login", "badge": "PRD" }, { "name": "IS4 PRD", "url": "https://is4.redeis.com.br/hsm-prd/", "badge": "PRD" }, { "name": "Notification PRD", "url": "https://hsm-prd.nox.app.br/auth-api/login", "badge": "PRD" }, { "name": "Noxcare TRE", "url": "https://hsm-tre.nox.app.br/#/", "badge": "TRE" }, { "name": "IS - Portal TRE", "url": "https://hsm-tre.nox.app.br/portal-ui/#/login", "badge": "TRE" }, { "name": "IS4 TRE", "url": "https://is4.redeis.com.br/hsm-tre/", "badge": "TRE" }, { "name": "Notification TRE", "url": "https://hsm-tre.nox.app.br/auth-api/login", "badge": "TRE" }, { "name": "Sharepoint / Docs", "url": "https://noxtecservicos.sharepoint.com/sites/DiretoriadeTecnologia/Documentos%20Compartilhados/Forms/AllItems.aspx", "badge": "INT" }] } } }, "Rio de Janeiro": { "flag": "static/bandeira-rj.png", "clients": { "Nova Friburgo": { "logo": "static/nfb-logo.png", "links": [{ "name": "Noxcare NFB PRD", "url": "https://nfb-prd.nox.app.br/#/", "badge": "PRD" }, { "name": "Regulação NFB PRD", "url": "https://nfb-prd.nox.app.br/regulation-ui/login/select-user-health-unit", "badge": "PRD" }, { "name": "IS4 PRD", "url": "http://is4.redeis.com.br:8888/nfb/", "badge": "PRD" }, { "name": "Noxcare TRE", "url": "https://nfb-tre.nox.app.br/#/", "badge": "TRE" }, { "name": "Regulação TRE", "url": "https://nfb-tre.nox.app.br/regulation-ui/regulation/waiting-list", "badge": "TRE" }, { "name": "IS4 TRE", "url": "http://is4.redeis.com.br:8888/nfb-tre/", "badge": "TRE" }, { "name": "PEC", "url": "https://esusab.pmnf.rj.gov.br:8080/", "badge": "EXT" }, { "name": "BI Regulação", "url": "https://app.powerbi.com/view?r=eyJrIjoiNGQ2OTg0ZjYtNDg5OC00OTk3LThhMDMtMDMyNzA0YTM0OGVhIiwidCI6ImYyYmM4YzM3LWFmYjgtNDE1Ny1hNGFmLWRlYTAxNjQ3OGU1ZSJ9", "badge": "BI" }, { "name": "IS-Indicadores", "url": "https://nfb.redeis.com.br/nfb-ui-is/IS-indicadores/#/", "badge": "BI" }, { "name": "NOXTEC - Login", "url": "https://noxcare.saladegestao.com.br/gestao/login", "badge": "INT" }] } } } };

        var storedAppData = localStorage.getItem('painelAppData');
        var APP_DATA = storedAppData ? JSON.parse(storedAppData) : defaultAPP_DATA;

        function saveData() {
            localStorage.setItem('painelAppData', JSON.stringify(APP_DATA));
        }

        var USERS = { "comum": { "password": "timetech" } };

        var session = { loggedIn: false, username: '' };
        var currentPage = '';

        function navigate(page) {
            window.location.hash = page;
        }

        function renderDashboard() {
            var container = document.getElementById('dashboard-container');
            var html = '';
            var badgeOrder = ['PRD', 'TRE', 'EXT', 'BI', 'INT'];
            var badgeLabels = { 'PRD': 'Produção', 'TRE': 'Treinamento', 'EXT': 'Externo', 'BI': 'Business Intelligence', 'INT': 'Interno' };
            var badgeIcons = { 'PRD': 'static/prd.png', 'TRE': 'static/tre.png', 'EXT': 'static/ext.png', 'BI': 'static/bi.png', 'INT': 'static/int.png' };

            for (var estado in APP_DATA) {
                var info = APP_DATA[estado];
                html += '<div class="dashboard-state">';
                html += '<div class="dashboard-state-header">';
                if (info.flag) {
                    html += '<img class="dashboard-state-flag" src="' + esc(info.flag) + '" alt="' + esc(estado) + '">';
                }
                html += '<div class="dashboard-state-title">' + esc(estado) + '</div>';
                html += '</div>'; // close header

                var clients = info.clients || {};
                html += '<div class="dashboard-clients-grid">';
                for (var cliente in clients) {
                    var cli = clients[cliente];
                    html += '<div class="dashboard-client">';
                    html += '<div class="dashboard-client-header">';
                    if (cli.logo) {
                        html += '<img class="dashboard-client-logo" src="' + esc(cli.logo) + '" alt="' + esc(cliente) + '">';
                    } else {
                        html += '<div class="dashboard-client-placeholder">' + esc(cliente.charAt(0)) + '</div>';
                    }
                    html += '<div class="dashboard-client-title">' + esc(cliente) + '</div>';
                    html += '</div>'; // close client header

                    var links = cli.links || [];
                    html += '<div class="flex-container" style="gap:0.8rem;">';
                    for (var b = 0; b < badgeOrder.length; b++) {
                        var badge = badgeOrder[b];
                        var filtered = links.filter(function (l) { return l.badge === badge; });
                        if (filtered.length === 0) continue;
                        html += '<div class="category-section cat-' + badge.toLowerCase() + '">';
                        html += '<div class="category-header"><div class="cat-icon">' + badge + '</div><span>' + badgeLabels[badge] + '</span><span class="cat-count">' + filtered.length + '</span></div>';
                        html += '<div class="category-body">';
                        for (var i = 0; i < links.length; i++) {
                            var link = links[i];
                            if (link.badge !== badge) continue;
                            html += '<a href="' + esc(link.url) + '" target="_blank" class="link-card">';
                            html += '<div class="link-info"><div class="link-name">' + esc(link.name) + '</div></div>';
                            html += '<span class="link-arrow">&#8250;</span></a>';
                        }
                        html += '</div></div>'; // close category-body and category-section
                    }
                    html += '</div>'; // close flex-container
                    html += '</div>'; // close dashboard-client
                }
                html += '</div>'; // close dashboard-clients-grid
                html += '</div>'; // close dashboard-state
            }
            container.innerHTML = html;
        }

        function esc(s) {
            if (!s) return '';
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function showPage(page) {
            var pages = document.querySelectorAll('.page');
            for (var i = 0; i < pages.length; i++) pages[i].classList.remove('active');
            document.getElementById('page-' + page).classList.add('active');
            currentPage = page;
            document.body.className = (page === 'login') ? 'login-page' : '';
        }

        function doLogin(e) {
            e.preventDefault();
            var p = document.getElementById('password').value.trim();

            var valid = false;
            for (var k in USERS) {
                var pw = typeof USERS[k] === 'string' ? USERS[k] : USERS[k].password;
                if (pw === p) {
                    valid = true;
                    break;
                }
            }

            if (!valid) {
                var el = document.getElementById('login-erro');
                el.textContent = 'Senha inválida';
                el.style.display = '';
                return false;
            }
            session.loggedIn = true;
            session.username = 'comum';
            navigate('dashboard');
            return false;
        }

        function doLogout() {
            session = { loggedIn: false, username: '' };
            navigate('login');
        }

        function handleHash() {
            var hash = window.location.hash.replace('#', '');
            if (!hash || hash === 'login') {
                if (!session.loggedIn) { showPage('login'); return; }
                navigate('dashboard');
                return;
            }
            if (!session.loggedIn) { showPage('login'); return; }
            if (hash === 'dashboard') { showPage('dashboard'); renderDashboard(); }
            else { showPage('login'); }
        }

        window.addEventListener('hashchange', handleHash);
        handleHash();
    </script>
</body>

</html>
